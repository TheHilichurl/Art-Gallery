<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Background Frame -->
  <rect x="20" y="20" width="45" height="45" rx="8" fill="none" stroke="url(#logoGradient)" stroke-width="8" />
  <!-- Overlapping Frame -->
  <rect x="40" y="40" width="45" height="45" rx="8" fill="url(#logoGradient)" />
  <!-- Inner Cutout -->
  <circle cx="62.5" cy="62.5" r="10" fill="#09090b" />
</svg>
